<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f0f13"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="บัญชีรายจ่าย"/>
<title>บัญชีรายรับ-รายจ่าย</title>
<script>
const manifestData={name:"บัญชีรายรับ-รายจ่าย",short_name:"บัญชี",start_url:".",display:"standalone",background_color:"#0f0f13",theme_color:"#7c6aff",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c6aff'/><text y='.9em' font-size='75' x='50%' dominant-baseline='middle' text-anchor='middle'>💰</text></svg>",sizes:"512x512",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:"application/json"});
const lnk=document.createElement("link");lnk.rel="manifest";lnk.href=URL.createObjectURL(blob);document.head.appendChild(lnk);
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f0f13;color:#e8e6f0;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#3a3a52;border-radius:4px}
.card{background:#17171f;border:1px solid #2a2a38;border-radius:16px}
.inp{background:#0f0f13;border:1.5px solid #2a2a38;border-radius:10px;color:#e8e6f0;font-family:inherit;font-size:16px;padding:12px 14px;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:#7c6aff}
.btn-primary{background:linear-gradient(135deg,#7c6aff,#a855f7);border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:inherit;font-size:16px;font-weight:600;padding:14px;width:100%;transition:opacity .2s,transform .1s}
.btn-primary:active{transform:scale(.97);opacity:.9}
.tab-btn{background:none;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.type-btn{border-radius:10px;font-size:14px;font-weight:600;padding:10px 20px;transition:all .2s}
.cat-pill{background:#1e1e2a;border:1.5px solid #2a2a38;border-radius:20px;cursor:pointer;font-size:13px;padding:8px 13px;transition:all .2s;white-space:nowrap;font-family:inherit}
.cat-pill.ai{background:#0d2e1a;border-color:#22c55e;color:#22c55e}
.cat-pill.ae{background:#2a1020;border-color:#f43f5e;color:#f43f5e}
.txn-row{align-items:center;background:#1a1a24;border:1px solid #242432;border-radius:12px;display:flex;gap:12px;padding:14px}
.icon-circle{align-items:center;border-radius:50%;display:flex;flex-shrink:0;font-size:20px;height:44px;justify-content:center;width:44px}
.progress-bar{background:#1e1e2a;border-radius:8px;height:8px;overflow:hidden}
.progress-fill{border-radius:8px;height:100%;transition:width .5s ease}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#13131b;border-top:1px solid #2a2a38;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;font-size:11px;color:#4a4a6a;transition:color .2s;border:none;background:none;font-family:inherit}
.nav-item.active{color:#7c6aff}
.nav-icon{font-size:22px}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#17171f;border:1px solid #3a2a6a;border-radius:12px;padding:10px 20px;font-size:13px;color:#a78bfa;z-index:999;transition:transform .3s ease;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
/* Slip Scanner */
.slip-zone{border:2px dashed #3a2a6a;border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;background:#0d0d14;position:relative}
.slip-zone:hover,.slip-zone.drag{border-color:#7c6aff;background:#12101e}
.slip-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.slip-preview{width:100%;border-radius:12px;max-height:200px;object-fit:contain;background:#0a0a10}
.ai-result{background:#0d1a10;border:1.5px solid #22c55e33;border-radius:12px;padding:16px;margin-top:12px}
.ai-result.err{background:#1a0d0d;border-color:#f43f5e33}
.spinner{width:28px;height:28px;border:3px solid #2a2a3a;border-top-color:#7c6aff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.confirm-btn{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;padding:12px;width:100%;margin-top:10px;transition:opacity .2s}
.confirm-btn:active{opacity:.8}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app" style="max-width:430px;margin:0 auto;padding:0 0 90px"></div>
<nav class="nav-bar">
  <button class="nav-item active" id="nav-overview" onclick="setTab('overview')"><span class="nav-icon">📊</span>สรุป</button>
  <button class="nav-item" id="nav-history" onclick="setTab('history')"><span class="nav-icon">📋</span>รายการ</button>
  <button class="nav-item" id="nav-slip" onclick="setTab('slip')"><span class="nav-icon">📸</span>สแกนสลิป</button>
  <button class="nav-item" id="nav-add" onclick="setTab('add')"><span class="nav-icon">➕</span>เพิ่ม</button>
</nav>

<script>
// ── CATEGORIES ──────────────────────────────────────────
const CATS={
  income:[
    {id:"salary",label:"เงินเดือน",icon:"💼"},
    {id:"freelance",label:"ฟรีแลนซ์",icon:"💻"},
    {id:"investment",label:"การลงทุน",icon:"📈"},
    {id:"other_in",label:"อื่นๆ",icon:"✨"},
  ],
  expense:[
    {id:"food",label:"อาหาร",icon:"🍜"},
    {id:"grocery",label:"ของกิน",icon:"🛒"},
    {id:"snack",label:"ของกินเล่น",icon:"🍿"},
    {id:"transport",label:"เดินทาง",icon:"🚗"},
    {id:"shopping",label:"ช้อปปิ้ง",icon:"🛍"},
    {id:"health",label:"สุขภาพ",icon:"💊"},
    {id:"insurance",label:"ประกัน",icon:"🛡️"},
    {id:"invest",label:"ลงทุน",icon:"📊"},
    {id:"entertainment",label:"บันเทิง",icon:"🎬"},
    {id:"utilities",label:"ค่าสาธารณูปโภค",icon:"💡"},
    {id:"other_out",label:"อื่นๆ",icon:"📦"},
  ]
};
const ALL_CATS=[...CATS.income,...CATS.expense];
const MONTHS_TH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const SK="expense_txns_v2";
const today=new Date().toISOString().split("T")[0];

let txns=[],activeTab="overview",filterMonth=today.slice(0,7),editId=null;
let form={type:"expense",category:"food",amount:"",note:"",date:today};
// slip state
let slipState={status:"idle",imgSrc:"",result:null,error:""}; // idle|loading|done|error

function getCat(id){return ALL_CATS.find(c=>c.id===id)||{label:id,icon:"💰"}}
function money(n){return n.toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(iso){return new Date(iso).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"})}
function monthLabel(ym){const[y,m]=ym.split("-").map(Number);return`${MONTHS_TH[m-1]} ${y+543}`}

// ── STORAGE ─────────────────────────────────────────────
function load(){
  try{const d=localStorage.getItem(SK);return d?JSON.parse(d):[
    {id:1,type:"income",category:"salary",amount:35000,note:"เงินเดือนเดือนนี้",date:today},
    {id:2,type:"expense",category:"food",amount:450,note:"ข้าวกลางวัน",date:today},
    {id:3,type:"expense",category:"transport",amount:120,note:"รถไฟฟ้า",date:today},
  ]}catch(e){return[]}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify(txns));showToast("✅ บันทึกแล้ว")}
  catch(e){showToast("❌ บันทึกไม่สำเร็จ")}
}

// ── TOAST ───────────────────────────────────────────────
let toastTimer;
function showToast(msg,dur=2000){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),dur);
}

// ── COMPUTED ────────────────────────────────────────────
function filtered(){return txns.filter(t=>t.date.startsWith(filterMonth)).sort((a,b)=>b.date.localeCompare(a.date))}
function totals(f){
  const inc=f.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=f.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  return{inc,exp,bal:inc-exp};
}
function byCategory(f){
  const map={};
  f.filter(t=>t.type==="expense").forEach(t=>{map[t.category]=(map[t.category]||0)+t.amount});
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

// ── ACTIONS ─────────────────────────────────────────────
function setTab(tab){activeTab=tab;render()}
function changeMonth(d){const[y,m]=filterMonth.split("-").map(Number);const dt=new Date(y,m-1+d,1);filterMonth=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`;render()}
function submitForm(){
  const amt=parseFloat(form.amount);if(!amt||isNaN(amt))return;
  if(editId!==null){txns=txns.map(t=>t.id===editId?{...t,...form,amount:amt}:t);editId=null;}
  else{txns=[...txns,{...form,id:Date.now(),amount:amt}];}
  form={type:"expense",category:"food",amount:"",note:"",date:today};
  save();activeTab="history";render();
}
function startEdit(id){
  const t=txns.find(x=>x.id===id);if(!t)return;
  form={type:t.type,category:t.category,amount:String(t.amount),note:t.note,date:t.date};
  editId=id;activeTab="add";render();
}
function deleteTxn(id){txns=txns.filter(t=>t.id!==id);save();render()}
function cancelEdit(){editId=null;form={type:"expense",category:"food",amount:"",note:"",date:today};render()}
function setFF(k,v){form[k]=v}

// ── AI SLIP SCANNER ─────────────────────────────────────
function onSlipFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    slipState={status:"loading",imgSrc:e.target.result,result:null,error:""};
    render();
    analyzeSlip(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function analyzeSlip(dataUrl){
  try{
    const base64=dataUrl.split(",")[1];
    const mediaType=dataUrl.split(";")[0].split(":")[1];
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        messages:[{
          role:"user",
          content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:`นี่คือสลิปโอนเงินจากแบงค์ไทย (กสิกร/SCB/กรุงไทย/PromptPay/อื่นๆ)
กรุณาอ่านข้อมูลและตอบกลับเป็น JSON เท่านั้น ไม่มีข้อความอื่น ไม่มี markdown:
{
  "amount": <ตัวเลขยอดโอน ไม่มีเครื่องหมาย>,
  "date": "<วันที่ในรูปแบบ YYYY-MM-DD>",
  "note": "<ชื่อผู้รับโอน หรือรายละเอียดการโอน>",
  "type": "expense",
  "bank": "<ชื่อแบงค์>",
  "confidence": <0-100 ความมั่นใจ>
}
ถ้าอ่านไม่ได้ให้ตอบ: {"error":"อ่านสลิปไม่ได้"}`}
          ]
        }]
      })
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||"").join("").trim();
    const clean=text.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    if(parsed.error){
      slipState={...slipState,status:"error",error:parsed.error};
    } else {
      slipState={...slipState,status:"done",result:parsed};
      // pre-fill form
      form={
        type:"expense",
        category:"other_out",
        amount:String(parsed.amount||""),
        note:parsed.note||"",
        date:parsed.date||today
      };
    }
  }catch(e){
    slipState={...slipState,status:"error",error:"วิเคราะห์ไม่สำเร็จ กรุณาลองใหม่"};
  }
  render();
}

function confirmSlip(){
  activeTab="add";
  slipState={status:"idle",imgSrc:"",result:null,error:""};
  render();
}

function resetSlip(){
  slipState={status:"idle",imgSrc:"",result:null,error:""};
  render();
}

// ── RENDER ──────────────────────────────────────────────
function render(){
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById("nav-"+activeTab);if(nb)nb.classList.add("active");

  const f=filtered();const{inc,exp,bal}=totals(f);
  const cats=form.type==="income"?CATS.income:CATS.expense;

  let html=`
  <div style="padding:24px 20px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:12px;color:#6b6b8a;letter-spacing:1px;text-transform:uppercase">บัญชีส่วนตัว</div>
        <div style="font-size:21px;font-weight:700;margin-top:2px">รายรับ-รายจ่าย</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="changeMonth(-1)" style="background:#1e1e2a;border:1px solid #2a2a38;border-radius:8px;color:#aaa;cursor:pointer;font-size:18px;padding:6px 11px;font-family:inherit">‹</button>
        <span style="font-size:13px;font-weight:600;min-width:72px;text-align:center">${monthLabel(filterMonth)}</span>
        <button onclick="changeMonth(1)" style="background:#1e1e2a;border:1px solid #2a2a38;border-radius:8px;color:#aaa;cursor:pointer;font-size:18px;padding:6px 11px;font-family:inherit">›</button>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#1a1530,#201535,#1a2035);border:1px solid #3a2a6a;border-radius:20px;padding:22px 22px 18px;margin-bottom:16px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(124,106,255,.2),transparent 70%);border-radius:50%"></div>
      <div style="font-size:13px;color:#8b7fc0;margin-bottom:4px">ยอดคงเหลือ</div>
      <div style="font-size:34px;font-weight:700;color:${bal>=0?"#a78bfa":"#f87171"};letter-spacing:-1px">${bal<0?"-":""}฿${money(Math.abs(bal))}</div>
      <div style="display:flex;gap:18px;margin-top:16px">
        <div><div style="font-size:11px;color:#6b6b8a;margin-bottom:2px">รายรับ</div><div style="font-size:15px;font-weight:600;color:#22c55e">+฿${money(inc)}</div></div>
        <div style="width:1px;background:#2a2a3a"></div>
        <div><div style="font-size:11px;color:#6b6b8a;margin-bottom:2px">รายจ่าย</div><div style="font-size:15px;font-weight:600;color:#f43f5e">-฿${money(exp)}</div></div>
      </div>
    </div>
  </div>
  <div style="padding:0 20px">`;

  // ── OVERVIEW ──
  if(activeTab==="overview"){
    const byCat=byCategory(f);
    html+=`<div style="display:flex;flex-direction:column;gap:16px">
      <div class="card" style="padding:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;color:#8b7fc0">รายจ่ายตามหมวดหมู่</div>
        ${byCat.length===0?`<div style="color:#4a4a6a;text-align:center;padding:20px 0;font-size:14px">ยังไม่มีรายจ่าย</div>`:
        byCat.map(([cat,amt])=>{
          const info=getCat(cat);const pct=exp>0?(amt/exp)*100:0;
          return`<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px"><span>${info.icon} ${info.label}</span><span style="color:#f43f5e;font-weight:600">฿${money(amt)}</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,#f43f5e,#fb923c)"></div></div>
            <div style="font-size:11px;color:#4a4a6a;margin-top:3px;text-align:right">${pct.toFixed(1)}%</div>
          </div>`}).join("")}
      </div>
      <div class="card" style="padding:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#8b7fc0">สัดส่วนรายรับ vs รายจ่าย</div>
        <div style="display:flex;height:12px;border-radius:8px;overflow:hidden">
          ${inc+exp>0?`<div style="flex:${inc};background:#22c55e;border-radius:8px 0 0 8px"></div><div style="flex:${exp};background:#f43f5e;border-radius:0 8px 8px 0"></div>`:`<div style="flex:1;background:#2a2a38"></div>`}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:13px;color:#6b6b8a">
          <span>🟢 รายรับ ${inc+exp>0?((inc/(inc+exp))*100).toFixed(0):0}%</span>
          <span>🔴 รายจ่าย ${inc+exp>0?((exp/(inc+exp))*100).toFixed(0):0}%</span>
        </div>
      </div>
      <div class="card" style="padding:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#8b7fc0">สถิติ</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[["รายการทั้งหมด",f.length+" รายการ","#7c6aff"],
             ["รายรับเฉลี่ย",f.filter(t=>t.type==="income").length>0?"฿"+money(inc/f.filter(t=>t.type==="income").length):"-","#22c55e"],
             ["รายจ่ายเฉลี่ย",f.filter(t=>t.type==="expense").length>0?"฿"+money(exp/f.filter(t=>t.type==="expense").length):"-","#f43f5e"],
             ["ออมได้",bal>0?"฿"+money(bal):"฿0.00","#f59e0b"]
          ].map(([l,v,c])=>`<div style="background:#0f0f13;border-radius:12px;padding:14px 12px"><div style="font-size:12px;color:#5a5a7a;margin-bottom:6px">${l}</div><div style="font-size:15px;font-weight:700;color:${c}">${v}</div></div>`).join("")}
        </div>
      </div>
    </div>`;
  }

  // ── HISTORY ──
  else if(activeTab==="history"){
    html+=`<div style="display:flex;flex-direction:column;gap:10px">`;
    if(f.length===0){
      html+=`<div style="text-align:center;padding:40px 0;color:#4a4a6a"><div style="font-size:40px;margin-bottom:12px">📭</div><div>ยังไม่มีรายการในเดือนนี้</div></div>`;
    }else{
      f.forEach(t=>{
        const info=getCat(t.category);
        html+=`<div class="txn-row">
          <div class="icon-circle" style="background:${t.type==="income"?"#0d2e1a":"#2a1020"}">${info.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px;margin-bottom:2px">${info.label}</div>
            <div style="font-size:12px;color:#5a5a7a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note||"—"} · ${fmtDate(t.date)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:700;color:${t.type==="income"?"#22c55e":"#f43f5e"}">${t.type==="income"?"+":"-"}฿${money(t.amount)}</div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
              <button onclick="startEdit(${t.id})" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px">✏️</button>
              <button onclick="deleteTxn(${t.id})" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px">🗑️</button>
            </div>
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  // ── SLIP SCANNER ──
  else if(activeTab==="slip"){
    html+=`<div style="display:flex;flex-direction:column;gap:16px">
      <div style="font-size:14px;color:#6b6b8a;text-align:center">ถ่ายรูปหรืออัปโหลดสลิปโอนเงิน<br>AI จะอ่านข้อมูลให้อัตโนมัติ</div>`;

    if(slipState.status==="idle"){
      html+=`<div class="slip-zone" id="slip-zone">
        <input type="file" accept="image/*" capture="environment" onchange="onSlipFile(this)"/>
        <div style="font-size:48px;margin-bottom:12px">📸</div>
        <div style="font-weight:600;font-size:16px;margin-bottom:6px">แตะเพื่อถ่ายรูป / เลือกจากคลัง</div>
        <div style="font-size:13px;color:#5a5a7a">รองรับ KBANK · SCB · KTB · PromptPay</div>
      </div>`;
    } else {
      html+=`<div style="position:relative">
        <img src="${slipState.imgSrc}" class="slip-preview"/>
        <button onclick="resetSlip()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:18px;width:32px;height:32px">✕</button>
      </div>`;

      if(slipState.status==="loading"){
        html+=`<div style="text-align:center;padding:20px"><div class="spinner"></div><div style="margin-top:12px;font-size:14px;color:#8b7fc0">AI กำลังอ่านสลิป...</div></div>`;
      } else if(slipState.status==="error"){
        html+=`<div class="ai-result err">
          <div style="font-size:20px;margin-bottom:8px">❌</div>
          <div style="font-size:14px;color:#f87171">${slipState.error}</div>
          <button onclick="resetSlip()" style="background:none;border:1px solid #f43f5e44;border-radius:8px;color:#f87171;cursor:pointer;font-family:inherit;font-size:13px;margin-top:12px;padding:8px 16px">ลองใหม่</button>
        </div>`;
      } else if(slipState.status==="done"&&slipState.result){
        const r=slipState.result;
        html+=`<div class="ai-result">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <div style="font-size:20px">✅</div>
            <div>
              <div style="font-weight:700;font-size:15px;color:#22c55e">อ่านสลิปสำเร็จ</div>
              <div style="font-size:12px;color:#4a6a4a">${r.bank||""} · ความมั่นใจ ${r.confidence||"?"}%</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;font-size:14px">
            <div style="display:flex;justify-content:space-between"><span style="color:#6b6b8a">ยอดเงิน</span><span style="font-weight:700;color:#22c55e">฿${money(r.amount||0)}</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#6b6b8a">วันที่</span><span>${r.date||"-"}</span></div>
            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:#6b6b8a;flex-shrink:0">รายละเอียด</span><span style="text-align:right">${r.note||"-"}</span></div>
          </div>
          <button class="confirm-btn" onclick="confirmSlip()">✅ ยืนยัน — ไปกรอกรายการ</button>
        </div>`;
      }
    }
    html+=`</div>`;
  }

  // ── ADD ──
  else if(activeTab==="add"){
    html+=`<div class="card" style="padding:20px;display:flex;flex-direction:column;gap:16px">
      ${slipState.status==="done"&&slipState.result?`<div style="background:#0d1a10;border:1px solid #22c55e33;border-radius:10px;padding:10px 14px;font-size:13px;color:#4ade80">📸 ข้อมูลจากสลิป — ตรวจสอบและแก้ไขได้</div>`:""}
      <div>
        <div style="font-size:13px;color:#6b6b8a;margin-bottom:8px">ประเภท</div>
        <div style="display:flex;gap:8px">
          ${["income","expense"].map(type=>`
            <button class="tab-btn type-btn" onclick="setFF('type','${type}');setFF('category','${type==="income"?"salary":"food"}');render()"
              style="flex:1;color:${form.type===type?"#fff":"#5a5a7a"};background:${form.type===type?(type==="income"?"#0d2e1a":"#2a1020"):"#1a1a24"};border:1.5px solid ${form.type===type?(type==="income"?"#22c55e":"#f43f5e"):"#2a2a38"}">
              ${type==="income"?"💰 รายรับ":"💸 รายจ่าย"}
            </button>`).join("")}
        </div>
      </div>
      <div>
        <div style="font-size:13px;color:#6b6b8a;margin-bottom:8px">หมวดหมู่</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${cats.map(c=>`<button class="cat-pill ${form.category===c.id?(form.type==="income"?"ai":"ae"):""}" onclick="setFF('category','${c.id}');render()">${c.icon} ${c.label}</button>`).join("")}
        </div>
      </div>
      <div>
        <div style="font-size:13px;color:#6b6b8a;margin-bottom:8px">จำนวนเงิน (บาท)</div>
        <input class="inp" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" value="${form.amount}" oninput="setFF('amount',this.value)"/>
      </div>
      <div>
        <div style="font-size:13px;color:#6b6b8a;margin-bottom:8px">หมายเหตุ</div>
        <input class="inp" type="text" placeholder="บันทึกรายการ..." maxlength="80" value="${form.note}" oninput="setFF('note',this.value)"/>
      </div>
      <div>
        <div style="font-size:13px;color:#6b6b8a;margin-bottom:8px">วันที่</div>
        <input class="inp" type="date" value="${form.date}" onchange="setFF('date',this.value)"/>
      </div>
      <button class="btn-primary" onclick="submitForm()">${editId!==null?"💾 บันทึกการแก้ไข":"✅ เพิ่มรายการ"}</button>
      ${editId!==null?`<button onclick="cancelEdit()" style="background:none;border:1px solid #2a2a38;border-radius:12px;color:#6b6b8a;cursor:pointer;font-family:inherit;font-size:14px;padding:10px">ยกเลิก</button>`:""}
    </div>`;
  }

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
}

function setFF(k,v){form[k]=v}

// ── INIT ────────────────────────────────────────────────
txns=load();render();

// ── SERVICE WORKER ───────────────────────────────────────
if("serviceWorker" in navigator){
  const sw=`const C="exp-v2";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))))`;
  const swb=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swb));
}
</script>
</body>
</html>
